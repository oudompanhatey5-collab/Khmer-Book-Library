<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បណ្ណាល័យឌីជីថល</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .book { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; cursor: pointer; text-align: center; border: 1px solid #eee; }
        .book:hover { transform: translateY(-5px); }
        .book img { width: 100%; height: 200px; object-fit: cover; }
        .book-info { padding: 10px; font-size: 0.85rem; font-weight: bold; color: #333; }
        .btn-read { background: var(--accent); color: white; border: none; padding: 8px; width: 100%; font-family: 'Kantumruy Pro'; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>បណ្ណាល័យឌីជីថលរបស់ខ្ញុំ</h1>
</header>

<div class="container">
    <div class="shelf" id="shelf"></div>
</div>

<script>
    const books = [
        { title: "តែងសេចក្ដី ភាគ១", cover: "6246.png", url: "https://sg.docworkspace.com/d/sbPaukE5TyHohEOB_zg523whyj452bchero" },
        { title: "តែងសេចក្ដី ភាគ២", cover: "6247.png", url: "https://sg.docworkspace.com/d/sbPauljJkP6wSmSY_6vwp6bc9afk5in4lez" },
        { title: "តែងសេចក្ដី ភាគ៣", cover: "6248.png", url: "https://sg.docworkspace.com/d/sbPaumcVfGHVvvDt_34dyjwdm3odejk1un8" },
        { title: "រឿង កាកី", cover: "6249.png", url: "https://sg.docworkspace.com/d/sbPaulkOdTTbpNQq_09ev052b0hu7g12zst" },
        { title: "រឿង ក្អែកការកូន", cover: "6250.png", url: "https://sg.docworkspace.com/d/sbPaugHSSH2Fj8EA_127shyvglangd2jode" },
        { title: "រឿង កុមារចេះភាសាសត្វ", cover: "6251.png", url: "https://sg.docworkspace.com/d/sbPaunuyIxSHiziz_0pqvo5ijslyr01y3sp" },
        { title: "រឿង ក្រពើរមិលគុណ", cover: "6252.png", url: "https://sg.docworkspace.com/d/sbPaueIqnvjRk1Ol_85ezo1mrste7o1mv4l" },
        { title: "រឿង កុមារពងទាប្រៃ", cover: "6253.png", url: "https://sg.docworkspace.com/d/sbPaumy3ECoH8Tg8_n8hif8tivwlan8t2fg" },
        { title: "រឿង កំណប់ឪពុក", cover: "6254.png", url: "https://sg.docworkspace.com/d/sbPauggsakySybvT_ivklq70dqjspensx6f" },
        { title: "រឿង ក្រុងឧដុង្គ", cover: "6255.png", url: "https://sg.docworkspace.com/d/sbPaunoYpxAebyaj_spyb4xyv0xmjoxq7kx" }
    ];

    const shelf = document.getElementById('shelf');
    books.forEach(b => {
        const div = document.createElement('div');
        div.className = 'book';
        // ប្តូរមកប្រើ window.open ដើម្បីបើក Link ក្នុង Tab ថ្មី
        div.onclick = () => window.open(b.url, '_blank');
        
        div.innerHTML = `
            <img src="${b.cover}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
            <div class="book-info">${b.title}</div>
            <button class="btn-read">ចុចអាន</button>
        `;
        shelf.appendChild(div);
    });
</script>
</body>
</html>
